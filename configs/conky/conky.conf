-- Conky desktop widget — top-left, Nerd-Font riced.
-- CPU / GPU / RAM / disk / network / weather / top processes.
-- Palette is overwritten in-place by scripts/set-theme.sh; edit
-- scripts/themes/<name>.sh, not this file, to change theme colors.

conky.config = {
    -- window placement & type
    -- 'normal' + below/sticky/skip_* gives reliable placement under mutter/Wayland
    -- (Xwayland ignores 'desktop' hints and drops the window anywhere).
    alignment = 'top_left',
    gap_x = 96,          -- clear the Ubuntu dock (~72-80px wide)
    gap_y = 60,
    minimum_width = 460,  maximum_width = 460,
    minimum_height = 900,
    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = false,   -- we want a dark panel, not wallpaper
    own_window_argb_visual = true,
    own_window_argb_value = 210,      -- ~82% opaque, lets a hint of wallpaper through
    own_window_colour = '1d2021',     -- panel bg
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_class = 'Conky',
    own_window_title = 'conky-widget',
    double_buffer = true,
    border_inner_margin = 14,
    border_outer_margin = 0,
    draw_borders = false,
    draw_shades = false,
    draw_outline = false,

    -- timing
    update_interval = 1,
    total_run_times = 0,
    no_buffers = true,

    -- text
    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=11',
    override_utf8_locale = true,
    xftalpha = 1,
    uppercase = false,
    use_spacer = 'none',
    short_units = true,
    top_name_width = 14,

    -- palette (overwritten by scripts/set-theme.sh)
    default_color = 'ebdbb2',        -- foreground
    default_outline_color = '1d2021',
    default_shade_color  = '1d2021',
    color1 = 'fe8019',               -- accent — section headers
    color2 = 'b8bb26',               -- good / values
    color3 = 'fabd2f',               -- warn
    color4 = 'fb4934',               -- alert
    color5 = '83a598',               -- bars / info
    color6 = 'd3869b',               -- accent2
    color7 = '8ec07c',               -- accent3
    color8 = '665c54',               -- muted (hrules)
    color9 = 'a89984',               -- secondary text

    -- bars / graphs
    default_bar_width = 220,
    default_bar_height = 8,
    default_graph_width = 220,
    default_graph_height = 22,
}

conky.text = [[
${color1}${font JetBrainsMono Nerd Font:bold:size=12} ${nodename}${font}${alignr}${color9}${kernel}${color}
${color8}${hr 2}${color}
${color1}${font JetBrainsMono Nerd Font:bold:size=42}${alignc}${time %H:%M}${font}${color}
${color9}${alignc}${time %A · %d %B %Y}${color}
${color9}${alignc}  up ${uptime_short}${color}
${color8}${hr 2}${color}

${color1}${font JetBrainsMono Nerd Font:bold:size=12}󰍛  CPU${font}${color}${alignr}${color2}${cpu cpu0}%${color}   ${color9}${freq_g}GHz${color}   ${color3}${execi 2 sensors 2>/dev/null | awk '/^Tctl:/ {gsub(/[+°C]/,"",$2); print $2; exit}'}°C${color}
${color5}${cpugraph cpu0 30,460 458588 fe8019 -t}${color}
${color9}00${color} ${color5}${cpubar cpu1 6,78}${color}  ${color9}01${color} ${color5}${cpubar cpu2 6,78}${color}  ${color9}02${color} ${color5}${cpubar cpu3 6,78}${color}  ${color9}03${color} ${color5}${cpubar cpu4 6,78}${color}
${color9}04${color} ${color5}${cpubar cpu5 6,78}${color}  ${color9}05${color} ${color5}${cpubar cpu6 6,78}${color}  ${color9}06${color} ${color5}${cpubar cpu7 6,78}${color}  ${color9}07${color} ${color5}${cpubar cpu8 6,78}${color}
${color9}08${color} ${color5}${cpubar cpu9 6,78}${color}  ${color9}09${color} ${color5}${cpubar cpu10 6,78}${color}  ${color9}10${color} ${color5}${cpubar cpu11 6,78}${color}  ${color9}11${color} ${color5}${cpubar cpu12 6,78}${color}
${color9}12${color} ${color5}${cpubar cpu13 6,78}${color}  ${color9}13${color} ${color5}${cpubar cpu14 6,78}${color}  ${color9}14${color} ${color5}${cpubar cpu15 6,78}${color}  ${color9}15${color} ${color5}${cpubar cpu16 6,78}${color}

${color1}${font JetBrainsMono Nerd Font:bold:size=12}󰢮  GPU${font}${color}${alignr}${color2}${execi 1 cat /sys/class/drm/card*/device/gpu_busy_percent 2>/dev/null | head -1}%${color}   ${color3}${execi 2 sensors 2>/dev/null | awk '/^edge:/ {gsub(/[+°C]/,"",$2); print $2; exit}'}°C${color}
${color5}${execibar 1 8,460 cat /sys/class/drm/card*/device/gpu_busy_percent 2>/dev/null | head -1}${color}
${color9}VRAM${alignr}${execi 2 awk 'NR==1 && FILENAME ~ /used/ {u=$1} NR==1 && FILENAME ~ /total/ {t=$1} END {printf "%d / %d MB  %d%%", u/1048576, t/1048576, (t>0?100*u/t:0)}' /sys/class/drm/card*/device/mem_info_vram_used /sys/class/drm/card*/device/mem_info_vram_total}${color}

${color1}${font JetBrainsMono Nerd Font:bold:size=12}󰾆  RAM${font}${color}${alignr}${color2}${mem}${color} ${color9}/ ${memmax}${color}   ${color2}${memperc}%${color}
${color5}${membar 8,460}${color}
${if_existing /proc/swaps}${color9}swap${color}${alignr}${color9}${swap} / ${swapmax}   ${swapperc}%${color}
${color5}${swapbar 6,460}${color}${endif}

${color1}${font JetBrainsMono Nerd Font:bold:size=12}󰋊  DISK${font}${color}${alignr}${color2}${fs_used /}${color} ${color9}/ ${fs_size /}${color}   ${color2}${fs_used_perc /}%${color}
${color5}${fs_bar 8,460 /}${color}
${color9} ${diskio_read}/s${alignr} ${diskio_write}/s${color}

${color1}${font JetBrainsMono Nerd Font:bold:size=12}󰖩  NET${font}${color}${alignr}${color9}${addr enp2s0}${color}
${color7} ${downspeed enp2s0}/s${color}${alignr}${color3} ${upspeed enp2s0}/s${color}
${color5}${downspeedgraph enp2s0 22,220 458588 8ec07c -t}${color}  ${color5}${upspeedgraph enp2s0 22,220 458588 fabd2f -t}${color}
${color9}total ↓ ${totaldown enp2s0}${alignr}↑ ${totalup enp2s0}${color}

${color1}${font JetBrainsMono Nerd Font:bold:size=12}  WEATHER${font}${color}${alignr}${color9}Dublin${color}
${font JetBrainsMono Nerd Font:size=12}${color}${execi 1800 ~/.local/bin/conky-weather}${font}

${color1}${font JetBrainsMono Nerd Font:bold:size=12}󰓅  TOP CPU${font}${color}${alignr}${color9}PID     %${color}
${color}${top name 1}${alignr}${color9}${top pid 1}  ${color2}${top cpu 1}${color}
${color}${top name 2}${alignr}${color9}${top pid 2}  ${color2}${top cpu 2}${color}
${color}${top name 3}${alignr}${color9}${top pid 3}  ${color2}${top cpu 3}${color}
${color}${top name 4}${alignr}${color9}${top pid 4}  ${color2}${top cpu 4}${color}
${color}${top name 5}${alignr}${color9}${top pid 5}  ${color2}${top cpu 5}${color}
${color1}${font JetBrainsMono Nerd Font:bold:size=12}󰾆  TOP MEM${font}${color}${alignr}${color9}PID     %${color}
${color}${top_mem name 1}${alignr}${color9}${top_mem pid 1}  ${color2}${top_mem mem 1}${color}
${color}${top_mem name 2}${alignr}${color9}${top_mem pid 2}  ${color2}${top_mem mem 2}${color}
${color}${top_mem name 3}${alignr}${color9}${top_mem pid 3}  ${color2}${top_mem mem 3}${color}
${color}${top_mem name 4}${alignr}${color9}${top_mem pid 4}  ${color2}${top_mem mem 4}${color}
${color}${top_mem name 5}${alignr}${color9}${top_mem pid 5}  ${color2}${top_mem mem 5}${color}
]]
