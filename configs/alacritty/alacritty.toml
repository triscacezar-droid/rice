# To switch themes, run `rice theme <name>` (or change the import below).
# Available dark themes:
#   gruvbox_dark.toml      (warm retro, high contrast)  <- default
#   catppuccin_mocha.toml  (colorful, pastel-y, trendy)
#   tokyo_night.toml       (dark, vivid blues/purples)
#   dracula.toml           (classic vibrant purple/pink/green)
#   nord.toml              (cool arctic blues)
#   everforest.toml        (muted forest greens)
#   kanagawa.toml          (japanese woodblock palette)
#   rose_pine.toml         (dusty rose / iris)
#   tokyo_night_storm.toml (storm variant of tokyo_night)
# Available light themes:
#   gruvbox_light.toml     (cream bg, warm)
#   solarized_light.toml   (Ethan Schoonover classic)
#   github_light.toml      (clean modern, like github.dev)
#   catppuccin_latte.toml  (latte — sister of mocha)
#   rose_pine_dawn.toml    (dawn — sister of rose_pine)
import = [
    "~/.config/alacritty/themes/gruvbox_dark.toml",
]

[window]
opacity = 0.95
padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "full"
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
size = 11.0
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
unfocused_hollow = true

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
    # Ctrl+Shift+C / Ctrl+Shift+V for copy/paste (like most terminals)
    { key = "C", mods = "Control|Shift", action = "Copy" },
    { key = "V", mods = "Control|Shift", action = "Paste" },
    # Ctrl+= / Ctrl+- / Ctrl+0 for font size
    { key = "Equals", mods = "Control", action = "IncreaseFontSize" },
    { key = "Plus",   mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus",  mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0",   mods = "Control", action = "ResetFontSize" },
    # Spawn new window
    { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
]
